<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Comment Viewer</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #24292f;
    --code-bg: #f6f8fa;
    --border: #d0d7de;
    --link: #0969da;
    --highlight-bg: #fff3bf;
    --highlight-border: #e8d44d;
    --blockquote-border: #d0d7de;
    --blockquote-text: #57606a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 32px;
  }
  body.split-view {
    max-width: none;
    padding: 40px 32px;
  }

  h1, h2, h3, h4 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
  }
  h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  h3 { font-size: 1.25em; }
  h4 { font-size: 1em; }

  p { margin-bottom: 16px; }

  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  blockquote {
    margin-bottom: 16px;
    padding: 0 1em;
    color: var(--blockquote-text);
    border-left: 0.25em solid var(--blockquote-border);
  }

  ul, ol {
    margin-bottom: 16px;
    padding-left: 2em;
  }
  li + li { margin-top: 4px; }
  li > p { margin-bottom: 8px; }

  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 85%;
    background: var(--code-bg);
    padding: 0.2em 0.4em;
    border-radius: 6px;
  }

  pre {
    margin-bottom: 16px;
    padding: 16px;
    overflow: auto;
    font-size: 85%;
    line-height: 1.45;
    background: var(--code-bg);
    border-radius: 6px;
  }
  pre code {
    background: none;
    padding: 0;
    font-size: 100%;
  }

  table {
    margin-bottom: 16px;
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    padding: 6px 13px;
    border: 1px solid var(--border);
  }
  th { font-weight: 600; }
  tr:nth-child(2n) { background: var(--code-bg); }

  hr {
    margin: 24px 0;
    border: none;
    border-top: 1px solid var(--border);
  }

  strong { font-weight: 600; }

  mark.comment-highlight {
    background-color: var(--highlight-bg);
    border-bottom: 2px solid var(--highlight-border);
    padding: 1px 2px;
    border-radius: 2px;
    cursor: pointer;
  }

  #upload-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #upload-area:hover, #upload-area.dragover {
    border-color: var(--link);
    background: #f0f6ff;
  }
  #upload-area p {
    color: var(--blockquote-text);
    font-size: 1.1em;
    margin: 0;
  }
  #upload-area .hint {
    font-size: 0.85em;
    margin-top: 8px;
  }
  #upload-area.compact {
    min-height: 0;
    padding: 8px 16px;
    flex-direction: row;
    gap: 8px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  #upload-area.compact p {
    font-size: 14px;
  }
  #upload-area.compact .hint {
    display: none;
  }
  #file-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: none;
  }

  #content { display: none; }

  #toolbar {
    display: none;
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    z-index: 10;
  }
  #toolbar select {
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--code-bg);
    color: var(--text);
  }
  #toolbar label {
    font-size: 14px;
    color: var(--blockquote-text);
    margin-right: 8px;
  }
  #csv-upload {
    margin-left: 16px;
  }
  #csv-btn {
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--code-bg);
    color: var(--text);
    cursor: pointer;
  }
  #csv-btn:hover {
    border-color: var(--link);
  }
  #csv-name {
    font-size: 14px;
    color: var(--blockquote-text);
    margin-left: 6px;
  }

  #main-layout {
    display: flex;
    gap: 32px;
  }
  #content-col {
    flex: 1;
    min-width: 0;
  }
  #sidebar {
    display: none;
    width: 360px;
    flex-shrink: 0;
    position: sticky;
    top: 60px;
    align-self: flex-start;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--code-bg);
    padding: 16px;
  }
  #sidebar h3 {
    font-size: 14px;
    margin: 0 0 12px;
    padding: 0;
    border: none;
    color: var(--blockquote-text);
  }
  .csv-card {
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .csv-card:hover {
    border-color: var(--link);
  }
  .csv-card.active {
    background: var(--highlight-bg);
    border-color: var(--highlight-border);
  }
  .csv-card-quoted {
    color: var(--text);
    margin-bottom: 4px;
    word-break: break-word;
  }
  .csv-card-content {
    color: var(--blockquote-text);
    font-size: 12px;
    word-break: break-word;
  }
  .csv-card-id {
    color: var(--blockquote-text);
    font-size: 11px;
    font-family: "SFMono-Regular", Consolas, monospace;
    opacity: 0.6;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="upload-area">
  <p id="upload-prompt">Drop a .md file here, or click to select</p>
  <p class="hint">comment-start/end marks will be highlighted</p>
  <p id="file-name"></p>
  <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden>
</div>

<div id="toolbar">
  <label for="mark-type">Comment mark type:</label>
  <select id="mark-type">
    <option value="start-end-mark">start-end-mark</option>
    <option value="moxt-mark">moxt-mark</option>
    <option value="markdown-link">markdown-link</option>
    <option value="markdown-note">markdown-note</option>
  </select>
  <span id="csv-upload">
    <button id="csv-btn" type="button">Load comments.csv</button>
    <span id="csv-name"></span>
    <input type="file" id="csv-input" accept=".csv" hidden>
  </span>
</div>

<div id="main-layout">
  <div id="content-col">
    <div id="content"></div>
  </div>
  <div id="sidebar">
    <h3>Comments</h3>
    <div id="sidebar-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
const toolbar = document.getElementById('toolbar');
const markType = document.getElementById('mark-type');
const content = document.getElementById('content');
const csvBtn = document.getElementById('csv-btn');
const csvInput = document.getElementById('csv-input');
const csvName = document.getElementById('csv-name');

const sidebar = document.getElementById('sidebar');
const sidebarList = document.getElementById('sidebar-list');

let rawText = '';
let commentsMap = null;
let csvRows = null;

uploadArea.addEventListener('click', () => fileInput.click());

uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => {
  uploadArea.classList.remove('dragover');
});
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readAndRender(file);
});

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (file) readAndRender(file);
});

markType.addEventListener('change', () => {
  if (rawText) renderMarkdown(rawText);
});

csvBtn.addEventListener('click', () => csvInput.click());
csvInput.addEventListener('change', () => {
  const file = csvInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const result = parseCSV(e.target.result);
    commentsMap = result.map;
    csvRows = result.rows;
    csvName.textContent = file.name;
    renderSidebar();
    if (rawText) renderMarkdown(rawText);
  };
  reader.readAsText(file);
});

const highlighters = {
  'start-end-mark': (text) => text.replace(
    /<comment-start\s+data-id="([^"]+)"\s*\/>([\s\S]*?)<comment-end\s+data-id="\1"\s*\/>/g,
    '<mark class="comment-highlight" data-comment-id="$1">$2</mark>'
  ),
  'moxt-mark': (text) => text.replace(
    /<moxt-comment\s+data-id="([^"]+)">([\s\S]*?)<\/moxt-comment>/g,
    '<mark class="comment-highlight" data-comment-id="$1">$2</mark>'
  ),
  'markdown-link': (text) => text.replace(
    /\[([^\]]*)\]\(comment:([^)]+)\)/g,
    '<mark class="comment-highlight" data-comment-id="$2">$1</mark>'
  ),
  'markdown-note': (text) => {
    if (!commentsMap) return text;
    let result = text;
    for (const [id, quoted] of commentsMap) {
      if (!quoted) continue;
      const footnote = '[^' + id + ']';
      const fnIdx = result.indexOf(footnote);
      if (fnIdx === -1) continue;
      const before = result.slice(0, fnIdx);
      const after = result.slice(fnIdx + footnote.length);
      const pattern = quoted.split('').map(c => /\s/.test(c) ? '\\s+' : escapeRegex(c)).join('\\s*');
      const re = new RegExp(pattern, 'g');
      let m, last = null;
      while ((m = re.exec(before)) !== null) last = m;
      if (!last) continue;
      const start = last.index;
      const end = start + last[0].length;
      const matched = before.slice(start, end);
      const tag = '<mark class="comment-highlight" data-comment-id="' + id + '">';
      const segments = matched.split(/(\n[ \t]*\n)/);
      const highlighted = segments.map((seg, i) => {
        if (i % 2 === 1) return seg;
        if (!seg) return '';
        const ws = seg.match(/^([ \t]*)/)[1];
        return ws + tag + seg.slice(ws.length) + '</mark>';
      }).join('');
      result = before.slice(0, start) + highlighted + after;
    }
    return result;
  },
};

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function parseCSV(csv) {
  const map = new Map();
  const rows = [];
  const lines = csv.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const row = parseCSVRow(lines[i]);
    if (row && row[0]) {
      map.set(row[0], row[1] || '');
      rows.push({ id: row[0], quoted: row[1] || '', content: row[2] || '' });
    }
  }
  return { map, rows };
}

function parseCSVRow(line) {
  if (!line.trim()) return null;
  const fields = [];
  let i = 0;
  while (i < line.length) {
    if (line[i] === '"') {
      let val = '';
      i++;
      while (i < line.length) {
        if (line[i] === '"' && line[i + 1] === '"') {
          val += '"';
          i += 2;
        } else if (line[i] === '"') {
          i++;
          break;
        } else {
          val += line[i];
          i++;
        }
      }
      fields.push(val);
      if (line[i] === ',') i++;
    } else {
      const next = line.indexOf(',', i);
      if (next === -1) {
        fields.push(line.slice(i));
        break;
      }
      fields.push(line.slice(i, next));
      i = next + 1;
    }
  }
  return fields;
}

function renderMarkdown(raw) {
  const type = markType.value;
  const process = highlighters[type] || ((t) => t);
  const processed = process(raw);

  marked.setOptions({ breaks: false, gfm: true });
  content.innerHTML = marked.parse(processed);

  content.querySelectorAll('mark.comment-highlight').forEach(mark => {
    mark.addEventListener('click', () => {
      const id = mark.dataset.commentId;
      const card = sidebarList.querySelector('.csv-card[data-comment-id="' + id + '"]');
      if (card) {
        sidebarList.querySelectorAll('.csv-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });
  });
}

function renderSidebar() {
  if (!csvRows) return;
  sidebarList.innerHTML = '';
  for (const row of csvRows) {
    const card = document.createElement('div');
    card.className = 'csv-card';
    card.dataset.commentId = row.id;

    const q = document.createElement('div');
    q.className = 'csv-card-quoted';
    q.textContent = row.quoted || '(empty)';
    card.appendChild(q);

    if (row.content) {
      const c = document.createElement('div');
      c.className = 'csv-card-content';
      c.textContent = row.content;
      card.appendChild(c);
    }

    const idEl = document.createElement('div');
    idEl.className = 'csv-card-id';
    idEl.textContent = row.id;
    card.appendChild(idEl);

    card.addEventListener('click', () => {
      const mark = content.querySelector('mark[data-comment-id="' + row.id + '"]');
      if (mark) {
        mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
        sidebarList.querySelectorAll('.csv-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      }
    });

    sidebarList.appendChild(card);
  }
  sidebar.style.display = 'block';
  document.body.classList.add('split-view');
}

function readAndRender(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    rawText = e.target.result;
    renderMarkdown(rawText);
    content.style.display = 'block';
    toolbar.style.display = 'block';
    uploadArea.classList.add('compact');
    document.getElementById('upload-prompt').textContent = 'Change file';
    document.getElementById('file-name').style.display = 'block';
    document.getElementById('file-name').textContent = file.name;
    document.title = file.name.replace(/\.[^.]+$/, '');
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
